<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Tic Tac Toe</title>
    <meta name="description" content="A premium, classic Tic Tac Toe game with an elegant minimalist design.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="title">Tic Tac Toe</h1>
            <div class="scoreboard">
                <div class="score-card player-x">
                    <span class="label">Player X</span>
                    <span class="score" id="scoreX">0</span>
                </div>
                <div class="score-card ties">
                    <span class="label">Ties</span>
                    <span class="score" id="scoreTie">0</span>
                </div>
                <div class="score-card player-o">
                    <span class="label">Player O</span>
                    <span class="score" id="scoreO">0</span>
                </div>
            </div>
            <div class="status-indicator">
                <span id="statusText">Player X's Turn</span>
            </div>
        </header>

        <main class="board-container">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            
            <div class="controls">
                <button id="resetBtn" class="btn-primary">Restart Game</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
